volumes:
  # Named volumes for model storage. Docker initialises these from the image on
  # first run; subsequent starts (including after image rebuilds) reuse the data
  # already on disk — models are never re-downloaded unless the volume is removed.
  hf_cache:
  checkpoints:

services:
  imagetagger:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    runtime: nvidia          # required for Jetson GPU access via NVIDIA Container Runtime
    network_mode: host
    volumes:
      - hf_cache:/app/.hf_cache
      - checkpoints:/app/checkpoints
    environment:
      - PORT=9100
      - RAM_CHECKPOINT=/app/checkpoints/ram_plus_swin_large_14m.pth
      - NVIDIA_VISIBLE_DEVICES=all
      - LOG_LEVEL=INFO
    restart: unless-stopped

